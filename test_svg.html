<!DOCTYPE html>
<html>
  <head>
    <style>
      body { margin: 0; padding: 20px; background: #eee; }
      svg { background: white; border: 1px solid red; }
    </style>
  </head>
  <body>
    <!-- Paste original potrace SVG to inspect it natively -->
    <svg version="1.0" xmlns="http://www.w3.org/2000/svg"
      width="248.000000pt" height="336.000000pt" viewBox="0 0 248.000000 336.000000"
      preserveAspectRatio="xMidYMid meet">
      <g transform="translate(0,336.000000) scale(0.100000,-0.100000)"
      fill="#000000" stroke="none">
        <script>
          document.addEventListener('DOMContentLoaded', () => {
            const bbox = document.querySelector('svg').getBBox();
            document.getElementById('res').innerText = JSON.stringify({x: bbox.x, y: bbox.y, width: bbox.width, height: bbox.height});
          });
        </script>
      </g>
    </svg>
    <div id="res"></div>
  </body>
</html>
